  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Unity Technologies
serviceCategory: Developer Tools and Gaming Backend
billingModel:
  pricingCategory: Hybrid (Seat + Usage-Based)
  billingFrequency: Monthly or Annual
  billingCurrency: USD
  chargeCategories:
    - Usage
