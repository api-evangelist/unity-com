  projectKey: project_id
  environmentKey: environment_id
  invoiceLevel: organization
billingSurface:
  dashboard: https://dashboard.unity.com
  usageReports: https://dashboard.unity.com (per-service usage tabs)
  invoiceDownload: Available via Unity Dashboard Billing section
  apiAccess: Limited — most financial data is dashboard-only; SCIM and Access APIs expose org membership only
optimizationLevers:
  - Use the UGS Pricing Estimator to model Cloud Code, Lobby, Relay, and Distributed Authority spend before launch
  - Cache Cloud Save reads via Remote Config or client-side memoization to reduce per-key billing
  - Batch Cloud Code work via Triggers/Scheduler to amortize cold-start cost
  - Pin fleets to lower-cost regions for Multiplay and right-size machine memory
  - Migrate to Unity Version Control free tier (25 GB) post-Q1 2026 to drop UVCS seat charges
notes:
  - Unity Pro 2026 pricing increased 5% to $2,310/seat/yr ($210/mo) effective 12 January 2026.
  - Multiplay (Game Server Hosting) direct operations ended 31 March 2026; service is now operated by Rocket
    Science Group.
  - Personal tier remains free for orgs with under $200K annual revenue/funding.
  - Havok Physics is no longer bundled with Pro/Enterprise/Industry plans on 6.3 LTS.
