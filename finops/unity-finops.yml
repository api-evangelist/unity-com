description: FOCUS-aligned FinOps definition for Unity. Combines seat-based engine licensing (Pro, Enterprise,
  Industry) with usage-based pricing for Unity Gaming Services (Cloud Code, Cloud Save, multiplayer suite, Multiplay,
  Vivox, Version Control) and ad-revenue monetization via LevelPlay.
